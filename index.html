<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CSS Gallery</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; text-decoration: none; color: white; border: 1px solid #334155; text-align: center; width: 200px; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); transition: 0.3s; }
        .icon { font-size: 50px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>My CSS Art Gallery</h1>
    <div class="container">
        <a href="Flappy-Penguin/" class="card">
            <span class="icon">🐧</span>
            <h2>Penguin</h2>
        </a>
        <a href="Ferris-Wheel/" class="card">
            <span class="icon">🎡</span>
            <h2>Ferris Wheel</h2>
        </a>
    </div>
</body>
</html>
